<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Lactancia">
<title>Lactancia</title>

<style>

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #faf9f7;
    margin: 0;
    color: #222;
}

main {
    max-width: 600px;
    margin: auto;
    padding: 25px 18px 50px;
}

h1 {
    text-align: center;
}

.subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 25px;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 18px;
    box-shadow: 0 3px 15px rgba(0,0,0,.06);
}

.side-buttons {
    display: flex;
    gap: 10px;
}

button {
    border: 0;
    border-radius: 15px;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
}

.side-button {
    flex: 1;
}

.left {
    background: #f1e2d8;
}

.right {
    background: #dfebf2;
}

.selected {
    outline: 3px solid #222;
}

.timer {
    text-align: center;
    font-size: 45px;
    margin: 25px 0 10px;
    font-variant-numeric: tabular-nums;
}

.status {
    text-align: center;
    color: #777;
    min-height: 24px;
}

.control-buttons {
    display: flex;
    gap: 10px;
    margin-top: 18px;
}

.control-buttons button {
    flex: 1;
}

.pause {
    background: #eee;
}

.finish {
    background: #222;
    color: white;
}

.last {
    border-top: 1px solid #eee;
    margin-top: 20px;
    padding-top: 18px;
    line-height: 1.7;
}


/* ESTADÍSTICAS */

.stats-title {
    margin-top: 0;
    margin-bottom: 14px;
}

.stats-row {
    display: grid;
    grid-template-columns: 1.15fr 1fr 1.3fr;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
    gap: 8px;
}

.stats-row:last-child {
    border-bottom: none;
}

.stats-label {
    font-size: 13px;
    font-weight: 700;
    color: #777;
}

.stats-value {
    font-size: 17px;
    font-weight: 700;
    text-align: right;
}

.stats-header {
    font-size: 11px;
    color: #999;
    text-align: right;
    margin-bottom: 3px;
}


/* HISTORIAL */

.add-button {
    width: 100%;
    background: #222;
    color: white;
    margin-bottom: 15px;
}

.entry {
    padding: 15px 0;
    border-bottom: 1px solid #eee;
}

.entry:last-child {
    border-bottom: none;
}

.entry-actions {
    margin-top: 10px;
    display: flex;
    gap: 8px;
}

.entry-actions button {
    padding: 8px 12px;
    font-size: 13px;
}

.edit {
    background: #eee;
}

.delete {
    background: #f5dddd;
}

.muted {
    color: #777;
}

.empty {
    text-align: center;
    color: #888;
    padding: 15px;
}


/* MODAL */

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    align-items: flex-end;
}

.modal.open {
    display: flex;
}

.modal-content {
    background: white;
    width: 100%;
    max-width: 600px;
    margin: auto;
    border-radius: 25px 25px 0 0;
    padding: 25px;
    box-sizing: border-box;
}

label {
    display: block;
    color: #666;
    margin-top: 15px;
    margin-bottom: 6px;
}

input,
select {
    width: 100%;
    box-sizing: border-box;
    padding: 13px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
}

.modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.modal-buttons button {
    flex: 1;
}

</style>
</head>


<body>

<main>

<h1>🍼 Lactancia</h1>

<div class="subtitle">
Registra las tomas de tu bebé
</div>


<!-- PRIMERA TARJETA: SE MANTIENE IGUAL -->

<div class="card">

<div class="side-buttons">

<button
id="leftButton"
class="side-button left"
onclick="selectSide('Izquierdo')">

🤱 Izquierdo

</button>


<button
id="rightButton"
class="side-button right"
onclick="selectSide('Derecho')">

🤱 Derecho

</button>

</div>


<div
id="timer"
class="timer">

00:00:00

</div>


<div
id="status"
class="status">

Selecciona un pecho para empezar

</div>


<div class="control-buttons">

<button
id="pauseButton"
class="pause"
onclick="togglePause()"
disabled>

⏸️ Pausar

</button>


<button
class="finish"
onclick="finishFeed()">

✓ Terminar

</button>

</div>


<div
id="lastFeed"
class="last">

</div>

</div>


<!-- NUEVAS ESTADÍSTICAS -->

<div class="card">

<h2 class="stats-title">
📊 Estadísticas
</h2>


<div class="stats-row">

<div class="stats-label">
HOY
</div>

<div>
<div class="stats-header">
🍼 TOMAS
</div>

<div
id="todayCount"
class="stats-value">

0

</div>

</div>


<div>
<div class="stats-header">
⏱️ TIEMPO
</div>

<div
id="todayTime"
class="stats-value">

0 min

</div>

</div>

</div>


<div class="stats-row">

<div class="stats-label">
MEDIA · 7 DÍAS
</div>

<div>
<div class="stats-header">
🍼 / DÍA
</div>

<div
id="sevenCount"
class="stats-value">

0

</div>

</div>


<div>
<div class="stats-header">
⏱️ / DÍA
</div>

<div
id="sevenTime"
class="stats-value">

0 min

</div>

</div>

</div>


<div class="stats-row">

<div class="stats-label">
MEDIA · TOTAL
</div>

<div>
<div class="stats-header">
🍼 / DÍA
</div>

<div
id="allCount"
class="stats-value">

0

</div>

</div>


<div>
<div class="stats-header">
⏱️ / DÍA
</div>

<div
id="allTime"
class="stats-value">

0 min

</div>

</div>

</div>

</div>


<!-- HISTORIAL -->

<div class="card">

<h2>
📋 Tomas de hoy
</h2>


<button
class="add-button"
onclick="openAddModal()">

＋ Añadir toma manualmente

</button>


<div
id="feedHistory">

</div>

</div>

</main>


<!-- MODAL -->

<div
id="modal"
class="modal">

<div class="modal-content">

<h2
id="modalTitle">

Añadir toma

</h2>


<label>
Hora de inicio
</label>

<input
id="feedTime"
type="time">


<label>
Pecho
</label>

<select
id="feedSide">

<option>
Izquierdo
</option>

<option>
Derecho
</option>

</select>


<label>
Duración en minutos
</label>

<input
id="feedMinutes"
type="number"
min="1"
value="10">


<div class="modal-buttons">

<button
onclick="closeModal()">

Cancelar

</button>


<button
onclick="saveFeed()">

Guardar

</button>

</div>

</div>

</div>


<script>

const STORAGE_KEY =
"lactancia_v3_prueba";


let feeds =
JSON.parse(
localStorage.getItem(STORAGE_KEY)
|| "[]"
);


let timer = {

running: false,

paused: false,

side: null,

startTime: null,

elapsed: 0,

lastUpdate: null

};


let editingId = null;



function saveFeeds() {

localStorage.setItem(

STORAGE_KEY,

JSON.stringify(feeds)

);

}



function today() {

return new Date()
.toISOString()
.substring(0,10);

}



function formatDuration(seconds) {

seconds =
Math.round(seconds);


let hours =
Math.floor(seconds / 3600);


let minutes =
Math.floor(
(seconds % 3600) / 60
);


if (hours > 0) {

if (minutes === 0) {

return hours + " h";

}

return hours +
" h " +
String(minutes).padStart(2,"0") +
" min";

}


return minutes + " min";

}



function updateTimer() {

if (
timer.running &&
!timer.paused
) {

let now =
Date.now();

timer.elapsed +=
(now - timer.lastUpdate) / 1000;

timer.lastUpdate =
now;

}


let totalSeconds =
Math.floor(timer.elapsed);


let hours =
Math.floor(
totalSeconds / 3600
);


let minutes =
Math.floor(
(totalSeconds % 3600) / 60
);


let seconds =
totalSeconds % 60;


document.getElementById(
"timer"
).textContent =

String(hours).padStart(2,"0")
+ ":" +

String(minutes).padStart(2,"0")
+ ":" +

String(seconds).padStart(2,"0");

}



function selectSide(side) {

if (!timer.running) {

timer.running = true;

timer.paused = false;

timer.side = side;

timer.startTime =
Date.now();

timer.lastUpdate =
Date.now();

}

else {

if (
timer.side !== side
) {

updateTimer();

timer.side = side;

timer.lastUpdate =
Date.now();

}

}


document.getElementById(
"leftButton"
).classList.toggle(
"selected",
side === "Izquierdo"
);


document.getElementById(
"rightButton"
).classList.toggle(
"selected",
side === "Derecho"
);


document.getElementById(
"pauseButton"
).disabled = false;


updateStatus();

}



function togglePause() {

if (!timer.running) {

return;

}


if (timer.paused) {

timer.paused = false;

timer.lastUpdate =
Date.now();

}

else {

updateTimer();

timer.paused = true;

}


updateStatus();

}



function updateStatus() {

if (!timer.running) {

document.getElementById(
"status"
).textContent =
"Selecciona un pecho para empezar";

return;

}


document.getElementById(
"status"
).textContent =

timer.side
+ " · "
+
(
timer.paused
?
"En pausa"
:
"En curso"
);

}



function finishFeed() {

if (!timer.running) {

return;

}


updateTimer();


let feed = {

id:
Date.now().toString(),

date:
today(),

time:
new Date(
timer.startTime
).toLocaleTimeString(
[],
{
hour:"2-digit",
minute:"2-digit"
}
),

side:
timer.side,

duration:
Math.round(
timer.elapsed
)

};


feeds.unshift(feed);

saveFeeds();


timer = {

running:false,

paused:false,

side:null,

startTime:null,

elapsed:0,

lastUpdate:null

};


document.getElementById(
"leftButton"
).classList.remove(
"selected"
);


document.getElementById(
"rightButton"
).classList.remove(
"selected"
);


document.getElementById(
"pauseButton"
).disabled = true;


render();

}



function openAddModal() {

editingId = null;


document.getElementById(
"modalTitle"
).textContent =
"Añadir toma";


document.getElementById(
"feedTime"
).value =
new Date().toLocaleTimeString(
[],
{
hour:"2-digit",
minute:"2-digit"
}
);


document.getElementById(
"feedSide"
).value =
"Izquierdo";


document.getElementById(
"feedMinutes"
).value =
"10";


document.getElementById(
"modal"
).classList.add(
"open"
);

}



function editFeed(id) {

let feed =
feeds.find(
x => x.id === id
);


if (!feed) {

return;

}


editingId = id;


document.getElementById(
"modalTitle"
).textContent =
"Editar toma";


document.getElementById(
"feedTime"
).value =
feed.time;


document.getElementById(
"feedSide"
).value =
feed.side;


document.getElementById(
"feedMinutes"
).value =
Math.max(
1,
Math.round(
feed.duration / 60
)
);


document.getElementById(
"modal"
).classList.add(
"open"
);

}



function closeModal() {

document.getElementById(
"modal"
).classList.remove(
"open"
);

}



function saveFeed() {

let time =
document.getElementById(
"feedTime"
).value;


let side =
document.getElementById(
"feedSide"
).value;


let minutes =
parseInt(
document.getElementById(
"feedMinutes"
).value
);


if (
!minutes ||
minutes <= 0
) {

alert(
"Introduce una duración válida."
);

return;

}


let feed = {

id:
editingId ||
Date.now().toString(),

date:
today(),

time:
time,

side:
side,

duration:
minutes * 60

};


if (editingId) {

let index =
feeds.findIndex(
x => x.id === editingId
);


if (index !== -1) {

feeds[index] =
feed;

}

}

else {

feeds.unshift(feed);

}


saveFeeds();

closeModal();

render();

}



function deleteFeed(id) {

if (
!confirm(
"¿Quieres eliminar esta toma?"
)
) {

return;

}


feeds =
feeds.filter(
x => x.id !== id
);


saveFeeds();

render();

}



/* ESTADÍSTICAS */

function calculateStatistics() {

let todayDate =
today();


let todayFeeds =
feeds.filter(
x => x.date === todayDate
);


let todaySeconds =
todayFeeds.reduce(
(sum,x) =>
sum + x.duration,
0
);


/* Últimos 7 días incluyendo hoy */

let last7Seconds = 0;

let last7Feeds = 0;


for (
let i = 0;
i < 7;
i++
) {

let date =
new Date();


date.setDate(
date.getDate() - i
);


let dateString =
date.toISOString()
.substring(0,10);


let dayFeeds =
feeds.filter(
x => x.date === dateString
);


last7Feeds +=
dayFeeds.length;


last7Seconds +=
dayFeeds.reduce(
(sum,x) =>
sum + x.duration,
0
);

}


/* Media absoluta */

let firstDate = null;


if (feeds.length > 0) {

firstDate =
feeds.reduce(
(min,x) =>
!min || x.date < min
?
x.date
:
min,
null
);

}


let absoluteDays = 0;

let absoluteFeeds = 0;

let absoluteSeconds = 0;


if (firstDate) {

let start =
new Date(
firstDate
);


let end =
new Date(
todayDate
);


absoluteDays =
Math.floor(
(end-start) /
86400000
) + 1;


absoluteFeeds =
feeds.length;


absoluteSeconds =
feeds.reduce(
(sum,x) =>
sum + x.duration,
0
);

}


let sevenFeedAverage =
last7Feeds / 7;


let sevenTimeAverage =
last7Seconds / 7;


let absoluteFeedAverage =
absoluteDays > 0
?
absoluteFeeds /
absoluteDays
:
0;


let absoluteTimeAverage =
absoluteDays > 0
?
absoluteSeconds /
absoluteDays
:
0;


document.getElementById(
"todayCount"
).textContent =
todayFeeds.length;


document.getElementById(
"todayTime"
).textContent =
formatDuration(
todaySeconds
);


document.getElementById(
"sevenCount"
).textContent =
sevenFeedAverage
.toFixed(1);


document.getElementById(
"sevenTime"
).textContent =
formatDuration(
sevenTimeAverage
);


document.getElementById(
"allCount"
).textContent =
absoluteFeedAverage
.toFixed(1);


document.getElementById(
"allTime"
).textContent =
formatDuration(
absoluteTimeAverage
);

}



function render() {

updateTimer();


calculateStatistics();


let todayFeeds =
feeds.filter(
x => x.date === today()
);


let last =
feeds[0];


if (last) {

let next =
last.side === "Izquierdo"
?
"Derecho"
:
"Izquierdo";


document.getElementById(
"lastFeed"
).innerHTML =

"<b>Última toma</b><br>" +

"🕐 " +
last.time +

" · 🤱 " +
last.side +

" · ⏱️ " +
formatDuration(
last.duration
) +

"<br><b>" +

"Siguiente pecho: " +

next +

"</b>";

}

else {

document.getElementById(
"lastFeed"
).innerHTML =

"<b>Última toma</b><br>" +

"<span class='muted'>" +

"Todavía no hay tomas registradas."

+

"</span>";

}


if (
todayFeeds.length === 0
) {

document.getElementById(
"feedHistory"
).innerHTML =

"<div class='empty'>" +

"Todavía no hay tomas registradas hoy."

+

"</div>";

return;

}


document.getElementById(
"feedHistory"
).innerHTML =

todayFeeds.map(
feed =>

"<div class='entry'>" +

"<b>" +
feed.time +
"</b><br>" +

"<span class='muted'>" +

"🤱 " +
feed.side +

" · ⏱️ " +
formatDuration(
feed.duration
) +

"</span>" +

"<div class='entry-actions'>" +

"<button class='edit' " +

"onclick=\"editFeed('" +
feed.id +
"')\">" +

"✏️ Editar" +

"</button>" +

"<button class='delete' " +

"onclick=\"deleteFeed('" +
feed.id +
"')\">" +

"🗑️ Eliminar" +

"</button>" +

"</div>" +

"</div>"

).join("");

}



setInterval(
render,
1000
);


render();

</script>

</body>
</html>
