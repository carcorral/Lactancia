<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Lactancia">
<meta name="theme-color" content="#faf9f7">

<title>Lactancia</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#faf9f7;
  color:#222;
  margin:0;
}

main{
  max-width:560px;
  margin:auto;
  padding:24px 18px 40px;
}

h1{
  text-align:center;
}

.sub{
  text-align:center;
  color:#777;
  margin-bottom:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 3px 15px #0001;
}

.buttons,
.controls,
.summary{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  border:0;
  border-radius:16px;
  padding:15px;
  font-size:16px;
  font-weight:700;
  background:#eee;
}

button:active{
  transform:scale(.98);
}

button:disabled{
  opacity:.45;
}

.left{
  background:#f3e6dc;
}

.right{
  background:#e1edf3;
}

.active{
  outline:3px solid #222;
}

.timer{
  text-align:center;
  font-size:42px;
  margin:18px 0 5px;
  font-variant-numeric:tabular-nums;
}

.status{
  text-align:center;
  color:#777;
}

.last{
  border-top:1px solid #eee;
  margin-top:18px;
  padding-top:15px;
  line-height:1.6;
}

.summary{
  margin-top:10px;
}

.stat{
  background:#f5f4f2;
  border-radius:15px;
  text-align:center;
  padding:12px;
}

.stat b{
  display:block;
  font-size:20px;
}

.row{
  padding:14px 0;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.actions{
  margin-top:7px;
  display:flex;
  gap:6px;
}

.actions button{
  font-size:13px;
  padding:8px;
}

.muted{
  color:#777;
}

.empty{
  text-align:center;
  color:#888;
  padding:15px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:#0007;
  align-items:flex-end;
  padding:14px;
}

.modal.show{
  display:flex;
}

.sheet{
  background:white;
  width:100%;
  max-width:560px;
  margin:auto;
  border-radius:22px;
  padding:20px;
}

label{
  display:block;
  color:#666;
  margin:12px 0 5px;
}

input,
select{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:16px;
  box-sizing:border-box;
}

.modalbuttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:18px;
}
</style>
</head>

<body>

<main>

<h1>🍼 Lactancia</h1>

<div class="sub">
Registra las tomas de forma sencilla
</div>

<section class="card">

<div class="buttons">

<button
id="left"
class="left"
onclick="start('Izquierdo')">
IZQUIERDO
</button>

<button
id="right"
class="right"
onclick="start('Derecho')">
DERECHO
</button>

</div>

<div
id="timer"
class="timer">
00:00:00
</div>

<div
id="status"
class="status">
Elige un pecho para empezar
</div>

<div
class="controls"
style="margin-top:16px">

<button
id="pause"
onclick="pause()"
disabled>
⏸️ Pausar
</button>

<button
onclick="finish()">
✓ Terminar
</button>

</div>

<div
id="last"
class="last">
</div>

</section>


<section class="card">

<h2>📊 Resumen de hoy</h2>

<div
id="summary"
class="summary">
</div>

</section>


<section class="card">

<div
style="display:flex;justify-content:space-between;align-items:center">

<h2>📋 Tomas de hoy</h2>

<button
onclick="addOpen()">
＋ Añadir
</button>

</div>

<div
id="history">
</div>

</section>

</main>


<div
id="modal"
class="modal">

<div class="sheet">

<h2 id="modalTitle">
Añadir toma
</h2>

<label>
Hora de inicio
</label>

<input
id="time"
type="time">


<label>
Pecho
</label>

<select id="side">

<option>
Izquierdo
</option>

<option>
Derecho
</option>

</select>


<label>
Duración (minutos)
</label>

<input
id="minutes"
type="number"
min="0">


<label>
Segundos
</label>

<input
id="seconds"
type="number"
min="0"
max="59">


<div
class="modalbuttons">

<button
onclick="closeModal()">
Cancelar
</button>

<button
onclick="saveManual()">
Guardar
</button>

</div>

</div>

</div>


<script>

const KEY='lactancia_v3';

let data=
JSON.parse(
localStorage.getItem(KEY)||'[]'
);

let state={
active:false,
paused:false,
side:null,
start:0,
last:0,
elapsed:0
};

let editId=null;


function uid(){

return Date.now().toString(36)+
Math.random().toString(36).slice(2);

}


function today(){

return new Date()
.toISOString()
.slice(0,10);

}


function short(seconds){

seconds=Math.round(seconds);

let minutes=
Math.floor(seconds/60);

let remaining=
seconds%60;

if(minutes===0){

return remaining+' s';

}

if(remaining===0){

return minutes+' min';

}

return minutes+
' min '+
remaining+
' s';

}


function save(){

localStorage.setItem(
KEY,
JSON.stringify(data)
);

}


function tick(){

if(
state.active &&
!state.paused
){

let now=Date.now();

state.elapsed +=
(now-state.last)/1000;

state.last=now;

}

}


function start(side){

if(!state.active){

let now=Date.now();

state={
active:true,
paused:false,
side:side,
start:now,
last:now,
elapsed:0
};

}

else if(
state.side!==side
){

tick();

state.side=side;

state.last=Date.now();

}

render();

}


function pause(){

if(!state.active){

return;

}

if(state.paused){

state.paused=false;

state.last=Date.now();

}

else{

tick();

state.paused=true;

}

render();

}


function finish(){

if(!state.active){

return;

}

tick();

data.unshift({

id:uid(),

date:today(),

time:new Date(
state.start
).toLocaleTimeString(
[],
{
hour:'2-digit',
minute:'2-digit'
}
),

side:state.side,

total:Math.round(
state.elapsed
)

});

save();

state={
active:false,
paused:false,
side:null,
start:0,
last:0,
elapsed:0
};

render();

}


function addOpen(){

editId=null;

document.getElementById(
'modalTitle'
).textContent=
'Añadir toma';

document.getElementById(
'time'
).value=
new Date().toLocaleTimeString(
[],
{
hour:'2-digit',
minute:'2-digit'
}
);

document.getElementById(
'side'
).value=
'Izquierdo';

document.getElementById(
'minutes'
).value=
10;

document.getElementById(
'seconds'
).value=
0;

document.getElementById(
'modal'
).classList.add(
'show'
);

}


function edit(id){

let item=
data.find(
x=>x.id===id
);

if(!item){

return;

}

editId=id;

document.getElementById(
'modalTitle'
).textContent=
'Editar toma';

document.getElementById(
'time'
).value=
item.time;

document.getElementById(
'side'
).value=
item.side;

document.getElementById(
'minutes'
).value=
Math.floor(
item.total/60
);

document.getElementById(
'seconds'
).value=
item.total%60;

document.getElementById(
'modal'
).classList.add(
'show'
);

}


function closeModal(){

document.getElementById(
'modal'
).classList.remove(
'show'
);

}


function saveManual(){

let time=
document.getElementById(
'time'
).value;

let side=
document.getElementById(
'side'
).value;

let minutes=
parseInt(
document.getElementById(
'minutes'
).value
)||0;

let seconds=
parseInt(
document.getElementById(
'seconds'
).value
)||0;

let total=
minutes*60+
seconds;

if(total<=0){

alert(
'Introduce una duración mayor que 0.'
);

return;

}

let item={

id:
editId||uid(),

date:
today(),

time:
time,

side:
side,

total:
total

};


if(editId){

let index=
data.findIndex(
x=>x.id===editId
);

if(index>=0){

data[index]=item;

}

}

else{

data.unshift(
item
);

}

save();

closeModal();

render();

}


function remove(id){

if(
confirm(
'¿Eliminar esta toma?'
)
){

data=
data.filter(
x=>x.id!==id
);

save();

render();

}

}


function render(){

tick();


let timer=
new Date(
state.elapsed*1000
)
.toISOString()
.substr(
11,
8
);

document.getElementById(
'timer'
).textContent=
timer;


document.getElementById(
'status'
).textContent=
state.active
?
state.side+
' · '+
(
state.paused
?
'En pausa'
:
'En curso'
)
:
'Elige un pecho para empezar';


document.getElementById(
'pause'
).disabled=
!state.active;


document.getElementById(
'pause'
).textContent=
state.paused
?
'▶️ Reanudar'
:
'⏸️ Pausar';


document.getElementById(
'left'
).classList.toggle(
'active',
state.side===
'Izquierdo'
);


document.getElementById(
'right'
).classList.toggle(
'active',
state.side===
'Derecho'
);


let todayData=
data.filter(
x=>x.date===today()
);


let total=
todayData.reduce(
(sum,x)=>
sum+x.total,
0
);


document.getElementById(
'summary'
).innerHTML=

'<div class="stat">'+
'<b>'+
todayData.length+
'</b>tomas</div>'+

'<div class="stat">'+
'<b>'+
short(total)+
'</b>tiempo total</div>';


let last=
data[0];


if(last){

let next=
last.side===
'Izquierdo'
?
'Derecho'
:
'Izquierdo';


document.getElementById(
'last'
).innerHTML=

'<b>Última toma</b><br>'+
'🕐 '+
last.time+
' · 🤱 '+
last.side+
' · ⏱️ '+
short(last.total)+
'<br><b>Siguiente pecho: '+
next+
'</b>';

}

else{

document.getElementById(
'last'
).innerHTML=

'<b>Última toma</b><br>'+
'<span class="muted">'+
'Todavía no hay tomas registradas.'+
'</span>';

}


if(
todayData.length
){

document.getElementById(
'history'
).innerHTML=

todayData.map(
x=>{

let next=
x.side===
'Izquierdo'
?
'Derecho'
:
'Izquierdo';


return

'<div class="row">'+

'<div>'+

'<b>'+
x.time+
'</b><br>'+

'<span class="muted">'+
x.side+
' · '+
short(x.total)+
'</span><br>'+

'<span class="muted">'+
'Siguiente: '+
next+
'</span>'+

'<div class="actions">'+

'<button onclick="edit(\\''+
x.id+
'\\')">'+
'✏️ Editar'+
'</button>'+

'<button onclick="remove(\\''+
x.id+
'\\')">'+
'🗑️ Eliminar'+
'</button>'+

'</div>'+

'</div>'+

'<b>'+
short(x.total)+
'</b>'+

'</div>';

}

).join('');

}

else{

document.getElementById(
'history'
).innerHTML=

'<div class="empty">'+
'Todavía no hay tomas registradas hoy.'+
'</div>';

}

}


setInterval(
render,
1000
);

render();

</script>

</body>
</html>
